version: '3.8'

services:
  # Additional docker reconciler node (node1 is already in colonies docker-compose)
  docker-reconciler-edge:
    image: colonyos/docker-reconciler:v1.0.2
    container_name: docker-reconciler-edge
    restart: unless-stopped
    volumes:
      # Mount Docker socket to manage containers on the host
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      # ColonyOS server connection (sourced from docker-compose.env)
      COLONIES_SERVER_HOST: ${COLONIES_SERVER_HOST}
      COLONIES_SERVER_PORT: ${COLONIES_SERVER_PORT}
      COLONIES_INSECURE: ${COLONIES_INSECURE}

      # Colony information
      COLONIES_COLONY_NAME: ${COLONIES_COLONY_NAME}
      COLONIES_COLONY_PRVKEY: ${COLONIES_COLONY_PRVKEY}

      # Executor configuration
      COLONIES_EXECUTOR_NAME: ${COLONIES_EXECUTOR_NAME}
      COLONIES_EXECUTOR_TYPE: ${COLONIES_EXECUTOR_TYPE}

      # Node metadata
      COLONIES_NODE_NAME: ${COLONIES_NODE_NAME}
      COLONIES_NODE_LOCATION: ${COLONIES_NODE_LOCATION}
    networks:
      - colonies_default

networks:
  colonies_default:
    external: true
    # This is the default network created by the colonies docker-compose
    # It must already exist (created when you run colonies docker-compose up)
